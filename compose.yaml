# Comments are provided throughout this file to help you get started.
# If you need more help, visit the Docker Compose reference guide at
# https://docs.docker.com/go/compose-spec-reference/

# Here the instructions define your application as a service called "server".
# This service is built from the Dockerfile in the current directory.
# You can add other services your application may depend on here, such as a
# database or a cache. For examples, see the Awesome Compose repository:
# https://github.com/docker/awesome-compose
services:
  server:
    build:
      context: ./backend
      target: prod
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: postgres
      DB_NAME: users
      # Password read from the same secret as the db service (never inlined).
      DB_PASSWORD_FILE: /run/secrets/db-password
      REDIS_URL: redis://redis:6379/0
    secrets:
      - db-password
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
  proxy:
      image: nginx:alpine
      ports:
        - "8080:8080"
      volumes:
        - ./nginx.conf:/etc/nginx/nginx.conf:ro
      depends_on:
        - server
  db:
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/db-password
      POSTGRES_DB: users
    secrets:
      - db-password
    volumes:
      - db-data:/var/lib/postgresql
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d users"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Stand-in for the third-party email API. The app POSTs the activation email
  # here (real httpx call + retry); echo-server replies 200 so the send
  # succeeds and logs the full request body, so the 4-digit code is observable
  # via `docker compose logs email`.
  email:
    image: ealen/echo-server
    expose:
      - "80"

  # --- Test runner: `docker compose run --rm tests` --------------------------
  tests:
    build:
      context: ./backend
      target: dev
    command: ["pytest"]

volumes:
  db-data:

# The DB password is provided via a file you create locally (and which is
# git-ignored). Run `echo <your-password> > db/password.txt` before the first
# `docker compose up`.
secrets:
  db-password:
    file: db/password.txt